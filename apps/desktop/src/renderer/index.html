<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>SuperiorSwarm</title>
		<style>
			body { margin: 0; background: #0a0a0a; }
			#splash {
				position: fixed;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				background: #0a0a0a;
				z-index: 9999;
				-webkit-app-region: drag;
				transition: opacity 0.3s ease;
			}
			#splash.hidden { opacity: 0; pointer-events: none; }
			#splash .logo {
				width: 80px;
				height: 80px;
				margin-bottom: 20px;
				border-radius: 18px;
			}
			#splash .title {
				font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
				font-size: 22px;
				font-weight: 600;
				color: #f5f5f7;
				letter-spacing: -0.3px;
				margin-bottom: 8px;
			}
			#splash .subtitle {
				font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
				font-size: 13px;
				color: #6e6e73;
			}
			#splash .dots { display: inline-flex; gap: 4px; margin-left: 2px; }
			#splash .dots span {
				width: 3px;
				height: 3px;
				border-radius: 50%;
				background: #6e6e73;
				animation: dot-blink 1.4s ease-in-out infinite;
			}
			#splash .dots span:nth-child(2) { animation-delay: 0.2s; }
			#splash .dots span:nth-child(3) { animation-delay: 0.4s; }
			@keyframes dot-blink {
				0%, 80%, 100% { opacity: 0.3; }
				40% { opacity: 1; }
			}
		</style>
	</head>
	<body>
		<div id="splash">
			<svg class="logo" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
				<defs>
					<filter id="c" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="28" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
					<filter id="lg" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="18" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
					<filter id="md" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="11" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
					<filter id="sm" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
					<radialGradient id="bg" cx="38%" cy="32%" r="55%"><stop offset="0%" stop-color="#191928"/><stop offset="100%" stop-color="#0c0c0c"/></radialGradient>
				</defs>
				<rect width="1024" height="1024" rx="226" fill="url(#bg)"/>
				<g style="transform-origin:512px 512px"><animateTransform attributeName="transform" type="scale" values="1;0.28;1" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
					<circle cx="829" cy="645" r="17" fill="#e07030" filter="url(#sm)"><animate attributeName="opacity" values="0.55;0;0.55" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
					<circle cx="195" cy="481" r="15" fill="#a04020"><animate attributeName="opacity" values="0.45;0;0.45" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
					<circle cx="624" cy="850" r="16" fill="#f0a060" filter="url(#sm)"><animate attributeName="opacity" values="0.48;0;0.48" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
					<circle cx="850" cy="358" r="14" fill="#e07030"><animate attributeName="opacity" values="0.38;0;0.38" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
					<circle cx="154" cy="563" r="13" fill="#a04020"><animate attributeName="opacity" values="0.34;0;0.34" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
					<circle cx="522" cy="891" r="15" fill="#f0a060" filter="url(#sm)"><animate attributeName="opacity" values="0.38;0;0.38" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
					<circle cx="870" cy="522" r="12" fill="#c05828"><animate attributeName="opacity" values="0.28;0;0.28" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
					<circle cx="317" cy="829" r="11" fill="#a04020"><animate attributeName="opacity" values="0.26;0;0.26" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
				</g>
				<g style="transform-origin:512px 512px"><animateTransform attributeName="transform" type="scale" values="1;0.46;1" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
					<circle cx="747" cy="542" r="30" fill="#e07030" filter="url(#md)"><animate attributeName="opacity" values="1;0.35;1" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
					<circle cx="297" cy="379" r="27" fill="#c05828" filter="url(#md)"><animate attributeName="opacity" values="0.82;0.2;0.82" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
					<circle cx="583" cy="727" r="29" fill="#f0a060" filter="url(#md)"><animate attributeName="opacity" values="1;0.3;1" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
					<circle cx="707" cy="317" r="25" fill="#f0b070" filter="url(#md)"><animate attributeName="opacity" values="1;0.3;1" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
					<circle cx="256" cy="624" r="24" fill="#a04020" filter="url(#md)"><animate attributeName="opacity" values="0.78;0.15;0.78" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
					<circle cx="768" cy="420" r="26" fill="#e07030" filter="url(#md)"><animate attributeName="opacity" values="1;0.3;1" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
					<circle cx="399" cy="747" r="23" fill="#c05828" filter="url(#md)"><animate attributeName="opacity" values="0.72;0.15;0.72" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/></circle>
				</g>
				<g style="transform-origin:512px 512px"><animateTransform attributeName="transform" type="scale" values="1;0.62;1" keyTimes="0;0.45;1" dur="3.2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
					<circle cx="440" cy="420" r="51" fill="#f0a060" filter="url(#lg)"/>
					<circle cx="604" cy="461" r="45" fill="#e07030" filter="url(#lg)"/>
					<circle cx="491" cy="604" r="41" fill="#f0b070" filter="url(#lg)"/>
					<circle cx="358" cy="563" r="36" fill="#c05828" opacity=".88" filter="url(#lg)"/>
					<circle cx="645" cy="378" r="34" fill="#e07030" filter="url(#lg)"/>
				</g>
				<circle cx="512" cy="512" r="87" fill="white" opacity=".92" filter="url(#c)"/>
				<circle cx="512" cy="512" r="49" fill="white"/>
			</svg>
			<div class="title">SuperiorSwarm</div>
			<div class="subtitle">Starting up<span class="dots"><span></span><span></span><span></span></span></div>
		</div>
		<div id="root"></div>
		<script type="module" src="./main.tsx"></script>
	</body>
</html>
