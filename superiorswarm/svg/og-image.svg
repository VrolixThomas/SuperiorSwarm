<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="c" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="md" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#191928"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <radialGradient id="warm" cx="28%" cy="50%" r="40%">
      <stop offset="0%" stop-color="rgba(200,100,40,0.1)"/>
      <stop offset="100%" stop-color="rgba(200,100,40,0)"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#warm)"/>

  <!-- SWARM centered in left third (300, 315) -->
  <circle cx="274" cy="297" r="30" fill="#f0a060" filter="url(#lg)"/>
  <circle cx="348" cy="319" r="26" fill="#e07030" filter="url(#lg)"/>
  <circle cx="289" cy="375" r="24" fill="#f0b070" filter="url(#lg)"/>
  <circle cx="225" cy="358" r="21" fill="#c05828" opacity=".88" filter="url(#lg)"/>
  <circle cx="365" cy="270" r="20" fill="#e07030" filter="url(#lg)"/>
  <circle cx="402" cy="344" r="17" fill="#e07030" filter="url(#md)"/>
  <circle cx="196" cy="268" r="15" fill="#c05828" opacity=".82" filter="url(#md)"/>
  <circle cx="334" cy="425" r="16" fill="#f0a060" filter="url(#md)"/>
  <circle cx="384" cy="238" r="14" fill="#f0b070" filter="url(#md)"/>
  <circle cx="180" cy="388" r="14" fill="#a04020" opacity=".78" filter="url(#md)"/>
  <circle cx="412" cy="292" r="15" fill="#e07030" filter="url(#md)"/>
  <circle cx="238" cy="436" r="13" fill="#c05828" opacity=".72" filter="url(#md)"/>
  <!-- CORE -->
  <circle cx="300" cy="318" r="52" fill="white" opacity=".92" filter="url(#c)"/>
  <circle cx="300" cy="318" r="29" fill="white"/>

  <!-- WORDMARK -->
  <text x="480" y="290"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="110"
    fill="#f0ede8"
    letter-spacing="-1">Superior</text>
  <text x="480" y="408"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="110"
    font-style="italic"
    fill="#e07030"
    letter-spacing="-1">Swarm</text>
  <text x="482" y="468"
    font-family="'Courier New', Courier, monospace"
    font-size="20"
    fill="#2e2e2e"
    letter-spacing="5">PULL REQUEST INTELLIGENCE</text>
</svg>
