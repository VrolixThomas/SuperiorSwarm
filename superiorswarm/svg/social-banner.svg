<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="c" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="md" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sm" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg" cx="20%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#191928"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="warm" cx="18%" cy="50%" r="35%">
      <stop offset="0%" stop-color="rgba(200,100,40,0.1)"/>
      <stop offset="100%" stop-color="rgba(200,100,40,0)"/>
    </radialGradient>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#warm)"/>

  <!-- Subtle vertical divider -->
  <line x1="750" y1="80" x2="750" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- ── SWARM MARK — centered in left half (375, 250) ── -->
  <!-- LARGE -->
  <circle cx="346" cy="232" r="26" fill="#f0a060" filter="url(#lg)"/>
  <circle cx="418" cy="252" r="23" fill="#e07030" filter="url(#lg)"/>
  <circle cx="362" cy="312" r="21" fill="#f0b070" filter="url(#lg)"/>
  <circle cx="290" cy="295" r="18" fill="#c05828" opacity=".88" filter="url(#lg)"/>
  <circle cx="437" cy="210" r="17" fill="#e07030" filter="url(#lg)"/>

  <!-- MED -->
  <circle cx="482" cy="282" r="15" fill="#e07030" filter="url(#md)"/>
  <circle cx="258" cy="213" r="13" fill="#c05828" opacity=".82" filter="url(#md)"/>
  <circle cx="405" cy="364" r="14" fill="#f0a060" filter="url(#md)"/>
  <circle cx="460" cy="185" r="12" fill="#f0b070" filter="url(#md)"/>
  <circle cx="240" cy="322" r="12" fill="#a04020" opacity=".78" filter="url(#md)"/>
  <circle cx="494" cy="230" r="13" fill="#e07030" filter="url(#md)"/>
  <circle cx="305" cy="372" r="11" fill="#c05828" opacity=".72" filter="url(#md)"/>
  <circle cx="450" cy="340" r="10" fill="#d06830" opacity=".75" filter="url(#md)"/>

  <!-- SMALL -->
  <circle cx="522" cy="330" r="8"  fill="#e07030" opacity=".55" filter="url(#sm)"/>
  <circle cx="200" cy="260" r="7"  fill="#a04020" opacity=".45"/>
  <circle cx="418" cy="406" r="8"  fill="#f0a060" opacity=".48" filter="url(#sm)"/>
  <circle cx="530" cy="195" r="7"  fill="#e07030" opacity=".38"/>
  <circle cx="175" cy="300" r="6"  fill="#a04020" opacity=".34"/>
  <circle cx="500" cy="138" r="7"  fill="#f0b070" opacity=".32"/>
  <circle cx="220" cy="168" r="6"  fill="#c05828" opacity=".24"/>

  <!-- CORE -->
  <circle cx="375" cy="255" r="44" fill="white" opacity=".92" filter="url(#c)"/>
  <circle cx="375" cy="255" r="25" fill="white"/>

  <!-- ── WORDMARK — right half ── -->
  <!-- "Superior" in DM Serif Display style — we embed text -->
  <text x="820" y="238"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="96"
    font-weight="normal"
    fill="#f0ede8"
    letter-spacing="-1">Superior</text>

  <!-- "Swarm" italic in orange -->
  <text x="820" y="338"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="96"
    font-style="italic"
    fill="#e07030"
    letter-spacing="-1">Swarm</text>

  <!-- tagline -->
  <text x="822" y="390"
    font-family="'Courier New', Courier, monospace"
    font-size="18"
    fill="#333"
    letter-spacing="5">PULL REQUEST INTELLIGENCE</text>
</svg>
