<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="c" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="md" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sm" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#191928"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
  </defs>

  <rect width="1000" height="1000" fill="url(#bg)"/>

  <!-- subtle top-left warmth -->
  <radialGradient id="warm" cx="35%" cy="30%" r="45%">
    <stop offset="0%" stop-color="rgba(200,100,40,0.08)"/>
    <stop offset="100%" stop-color="rgba(200,100,40,0)"/>
  </radialGradient>
  <rect width="1000" height="1000" fill="url(#warm)"/>

  <!-- LARGE nodes — offset from true center (500,500) to match swarm feel -->
  <circle cx="430" cy="410" r="50" fill="#f0a060" filter="url(#lg)"/>
  <circle cx="590" cy="450" r="44" fill="#e07030" filter="url(#lg)"/>
  <circle cx="480" cy="590" r="40" fill="#f0b070" filter="url(#lg)"/>
  <circle cx="350" cy="550" r="35" fill="#c05828" opacity=".88" filter="url(#lg)"/>
  <circle cx="630" cy="370" r="33" fill="#e07030" filter="url(#lg)"/>

  <!-- MEDIUM -->
  <circle cx="730" cy="530" r="29" fill="#e07030" filter="url(#md)"/>
  <circle cx="290" cy="370" r="26" fill="#c05828" opacity=".82" filter="url(#md)"/>
  <circle cx="570" cy="710" r="28" fill="#f0a060" filter="url(#md)"/>
  <circle cx="690" cy="310" r="24" fill="#f0b070" filter="url(#md)"/>
  <circle cx="250" cy="610" r="23" fill="#a04020" opacity=".78" filter="url(#md)"/>
  <circle cx="750" cy="410" r="25" fill="#e07030" filter="url(#md)"/>
  <circle cx="390" cy="730" r="22" fill="#c05828" opacity=".72" filter="url(#md)"/>
  <circle cx="670" cy="640" r="20" fill="#d06830" opacity=".75" filter="url(#md)"/>

  <!-- SMALL -->
  <circle cx="810" cy="630" r="16" fill="#e07030" opacity=".55" filter="url(#sm)"/>
  <circle cx="190" cy="470" r="14" fill="#a04020" opacity=".45"/>
  <circle cx="610" cy="830" r="15" fill="#f0a060" opacity=".48" filter="url(#sm)"/>
  <circle cx="830" cy="350" r="13" fill="#e07030" opacity=".38"/>
  <circle cx="150" cy="550" r="12" fill="#a04020" opacity=".34"/>
  <circle cx="510" cy="870" r="14" fill="#f0a060" opacity=".38" filter="url(#sm)"/>
  <circle cx="850" cy="510" r="11" fill="#c05828" opacity=".28"/>
  <circle cx="310" cy="810" r="10" fill="#a04020" opacity=".26"/>
  <circle cx="770" cy="240" r="12" fill="#f0b070" opacity=".32"/>
  <circle cx="210" cy="290" r="10" fill="#c05828" opacity=".24"/>

  <!-- CORE -->
  <circle cx="500" cy="500" r="85" fill="white" opacity=".92" filter="url(#c)"/>
  <circle cx="500" cy="500" r="48" fill="white"/>
</svg>
